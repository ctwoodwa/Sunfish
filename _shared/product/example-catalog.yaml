# Sunfish canonical example catalog (ADR 0022)
#
# This file is the parity contract for every Sunfish provider library:
# kitchen-sink (Sunfish.Blazor adapter), compat-telerik demos, future
# Sunfish.React / Sunfish.WC demo hosts, and any third-party provider
# library that opts into Sunfish's catalog shape.
#
# Status values:
#   sunfish-implemented — component/package exists; demo/docs required
#   sunfish-partial     — exists but not all examples apply yet
#   aspirational        — catalog reserves the node; no Sunfish impl yet
#
# Phase 1 inventory populates this file. Today's skeleton lists the
# families the intake names; subagent passes fill the leaves.

version: 1
updated: 2026-04-21

