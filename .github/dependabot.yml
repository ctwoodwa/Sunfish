version: 2
updates:
  # NuGet — Central Package Management (Directory.Packages.props)
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Match repo's commitlint type-enum: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert
    # Per memory project_commitlint_type_enum + commitlint.config.mjs.
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.AspNetCore.SignalR.*"
      testing:
        patterns:
          - "xunit*"
          - "bunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"

  # GitHub Actions — pin to latest SHAs
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
