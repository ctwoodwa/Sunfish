name: Bug Report
description: Report a bug in a Sunfish component or package
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all fields to help us triage quickly.

  - type: input
    id: component
    attributes:
      label: Component / Package
      description: Which Sunfish component or package is affected?
      placeholder: "e.g. SunfishDataGrid (packages/ui-adapters-blazor)"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Blazor Server
        - Blazor WASM
        - Blazor Hybrid
        - React
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sunfish Version
      placeholder: "e.g. 0.1.0 or main@abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Add `<SunfishButton>` to a page
        2. Click the button
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Error messages, screenshots, minimal repro repo link.
