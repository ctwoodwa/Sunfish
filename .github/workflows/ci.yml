name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (foundation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore packages/foundation/Sunfish.Foundation.csproj

      - name: Build
        run: dotnet build packages/foundation/Sunfish.Foundation.csproj --no-restore

      - name: Test
        run: dotnet test packages/foundation/tests/tests.csproj --no-build --logger "trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
