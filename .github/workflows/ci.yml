name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Sunfish.slnx

      - name: Build
        run: dotnet build Sunfish.slnx --no-restore

      - name: Test
        run: dotnet test Sunfish.slnx --no-build --logger "trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
