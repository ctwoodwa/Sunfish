name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Anchor (accelerators/anchor/Sunfish.Anchor.csproj) targets net11.0-maccatalyst
      # on non-Windows hosts; that target needs the macos and maui-tizen workloads
      # which the runner image doesn't ship. `dotnet workload restore` reads every
      # project under Sunfish.slnx and installs whatever they need. NETSDK1147
      # (the previous failure mode) explicitly recommends this command.
      - name: Restore .NET workloads
        run: dotnet workload restore Sunfish.slnx

      - name: Restore
        run: dotnet restore Sunfish.slnx

      - name: Build
        run: dotnet build Sunfish.slnx --no-restore

      - name: Test
        run: dotnet test Sunfish.slnx --no-build --logger "trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
