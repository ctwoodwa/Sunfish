name: Claude Code Review

# Two trigger paths:
#   1. pull_request opened/synchronize — auto-review every PR.
#   2. issue_comment with @claude — on-demand follow-ups (reviewer answers
#      a question, looks deeper at one file, etc.) without re-running the
#      full review on every push.
#
# Stays ADVISORY (not a required status check) until calibration is good.
# Branch protection should NOT list this job under required-status-checks
# until the team is confident in its signal-to-noise ratio. After 1–2 weeks
# of observation, promote by adding it to branch-protection.json.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude Code Review
    # Skip @claude mentions on issues (this workflow is PR-scoped); only
    # run the comment-triggered path when the comment is on a PR and the
    # body actually contains @claude.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # Skip cleanly when ANTHROPIC_API_KEY isn't configured. Without this,
      # every PR shows a noisy red Claude Code Review check until the secret
      # is set. The expression secrets.X != '' resolves to 'true' or 'false'
      # at the runner without ever logging the secret value.
      - name: Check Anthropic API key configured
        id: precheck
        run: |
          echo "configured=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> $GITHUB_OUTPUT

      - name: Skip notice (no API key)
        if: steps.precheck.outputs.configured != 'true'
        run: |
          echo "::notice title=Claude Code Review skipped::ANTHROPIC_API_KEY secret is not set. Add it at Settings → Secrets and variables → Actions → New repository secret to enable automated reviews. Until then, this workflow no-ops cleanly on every PR."

      - uses: actions/checkout@v6
        if: steps.precheck.outputs.configured == 'true'
        with:
          # Full history lets the reviewer trace blame, related ADRs,
          # and prior changes referenced in commit messages.
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.precheck.outputs.configured == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The prompt sets the review framing; project-specific guidance
          # lives in .github/claude-instructions.md (auto-loaded) and the
          # repo-root CLAUDE.md (auto-loaded). Keep this prompt focused on
          # the *job* (review a diff, post comments) — let the docs files
          # supply the *context* (what Sunfish cares about).
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are reviewing a Sunfish pull request. Read CLAUDE.md and
            .github/claude-instructions.md before forming opinions; both
            describe what Sunfish considers good.

            Focus your review on:
            - Correctness and obvious bugs
            - Sunfish-specific invariants (adapter parity, framework-
              agnostic-first, ADR adherence, accessibility-first,
              i18n discipline, CSS logical properties, package layering)
            - Trust impact (security, attestation, persistence, sync)
            - Whether the PR's stated scope matches its actual diff

            Skip:
            - Generic "looks good" comments
            - Style nits already enforced by analyzers / linters / CI
            - Suggestions for hypothetical-future abstractions
            - Restating what well-named code already conveys

            Output:
            - Use mcp__github_inline_comment__create_inline_comment for
              specific code issues (with confirmed: true).
            - Use `gh pr comment` for the top-level summary.
            - Do NOT post review text as chat messages — only as GitHub
              comments.
            - If the diff looks clean, post a brief acknowledgment via
              `gh pr comment` and stop. Don't manufacture findings.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 12
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh api:*),Read,Grep,Glob"
          # Consolidate feedback into one sticky comment that updates on
          # each push (instead of accumulating per-push comments).
          use_sticky_comment: true
          # Inline "Fix this" affordances on suggestions when applicable.
          include_fix_links: true
