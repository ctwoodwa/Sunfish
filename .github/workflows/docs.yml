name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/docs/**'
      - 'packages/**/*.cs'
      - 'packages/**/*.csproj'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      # Restore/build ONLY the three packages docfx consumes (foundation, ui-core,
      # ui-adapters-blazor — see apps/docs/docfx.json `metadata.src.files`). A
      # solution-wide `dotnet restore Sunfish.slnx` pulls in accelerators/anchor,
      # which conditionally targets net11.0-maccatalyst on non-Windows and triggers
      # NETSDK1147 on Linux runners (the `macos` + `maui-tizen` workloads can't be
      # installed off macOS). The three docfx packages are pure net11.0 and restore
      # cleanly on ubuntu-latest. The csproj-level `<ProjectReference>`s still pull
      # in transitive deps (foundation→none, ui-core→foundation, ui-adapters-blazor
      # →ui-core+foundation), so docfx gets the full dependency graph it needs to
      # resolve XML doc comment links.
      - name: Restore packages (docfx-only)
        run: |
          dotnet restore packages/foundation/Sunfish.Foundation.csproj
          dotnet restore packages/ui-core/Sunfish.UICore.csproj
          dotnet restore packages/ui-adapters-blazor/Sunfish.UIAdapters.Blazor.csproj

      - name: Build packages (to emit DLLs + XML doc comments for metadata)
        run: |
          dotnet build packages/foundation/Sunfish.Foundation.csproj --configuration Debug --no-restore
          dotnet build packages/ui-core/Sunfish.UICore.csproj --configuration Debug --no-restore
          dotnet build packages/ui-adapters-blazor/Sunfish.UIAdapters.Blazor.csproj --configuration Debug --no-restore

      - name: Build docs
        run: dotnet docfx apps/docs/docfx.json --warningsAsErrors

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
