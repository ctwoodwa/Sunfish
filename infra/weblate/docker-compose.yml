# Sunfish Weblate 5.17.1 self-hosted translator platform.
# See infra/weblate/README.md for ops runbook; see waves/global-ux/week-2-weblate-ops-runbook.md
# for the Week-2 stand-up + backup procedure.
#
# Derived from https://github.com/WeblateOrg/docker-compose/blob/main/docker-compose.yml
# with Sunfish-specific pinning (exact image tags) and Valkey substituted for Redis
# (API-compatible; BSD-3 license matches Sunfish's open-format posture).
version: "3.9"

services:
  weblate:
    image: weblate/weblate:5.17.1-5
    container_name: sunfish-weblate
    restart: unless-stopped
    ports:
      - "${WEBLATE_HTTP_PORT:-8080}:8080"
    environment:
      WEBLATE_SITE_DOMAIN: ${WEBLATE_SITE_DOMAIN}
      WEBLATE_SITE_TITLE: "Sunfish Translator Platform"
      WEBLATE_ADMIN_NAME: ${WEBLATE_ADMIN_NAME}
      WEBLATE_ADMIN_EMAIL: ${WEBLATE_ADMIN_EMAIL}
      WEBLATE_ADMIN_PASSWORD: ${WEBLATE_ADMIN_PASSWORD}
      WEBLATE_SECRET_KEY: ${WEBLATE_SECRET_KEY}
      WEBLATE_DEBUG: "0"
      # Database.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: weblate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: weblate
      # Cache / queues.
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Machine-translation backend for MADLAD-400 (see infra/weblate/mt-backends.md).
      WEBLATE_MT_OPENAI_BASE_URL: ${WEBLATE_MT_OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}
      WEBLATE_MT_OPENAI_KEY: ${WEBLATE_MT_OPENAI_KEY:-local-llama-cpp}
      WEBLATE_MT_OPENAI_MODEL: madlad400-3b-mt
      # Email (Weblate requires a working SMTP for user invites).
      WEBLATE_EMAIL_HOST: ${WEBLATE_EMAIL_HOST}
      WEBLATE_EMAIL_HOST_USER: ${WEBLATE_EMAIL_HOST_USER}
      WEBLATE_EMAIL_HOST_PASSWORD: ${WEBLATE_EMAIL_HOST_PASSWORD}
      WEBLATE_DEFAULT_FROM_EMAIL: ${WEBLATE_DEFAULT_FROM_EMAIL}
    volumes:
      - ./data/weblate:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
    # Host mapping so Weblate can reach the llama.cpp server running on the VM's host
    # network (OpenAI-compatible MT backend).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17.2-alpine3.20
    container_name: sunfish-weblate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: weblate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: weblate
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "weblate"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: sunfish-weblate-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/valkey:/data
