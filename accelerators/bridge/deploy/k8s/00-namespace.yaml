# ============================================================================
# Bridge Option B — Kubernetes namespace
# ============================================================================
# Namespace name encodes the tenant slug so operators running multiple Option B
# tenants on a shared cluster get clean isolation. For a single-tenant cluster,
# the slug is decorative but still recommended for consistency with the
# NetworkPolicy selectors.
#
# Rename via Kustomize: set `namespace: sunfish-bridge-<yourslug>` in
# kustomization.yaml and Kustomize will rewrite every manifest.

apiVersion: v1
kind: Namespace
metadata:
  name: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/managed-by: kustomize
    sunfish.io/deployment: option-b
    sunfish.io/tenant-slug: acmedemo
