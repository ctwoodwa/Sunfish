# ============================================================================
# Bridge web — Deployment + Service + Ingress
# ============================================================================
# The Bridge image is customer-published; update `CHANGE_ME/sunfish-bridge:tag`
# via a Kustomize image transformer in kustomization.yaml.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: bridge-web
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: bridge-web

---
apiVersion: v1
kind: Service
metadata:
  name: bridge-web
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: bridge-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: bridge-web
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-web
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: bridge-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: bridge-web
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: sunfish-bridge
        app.kubernetes.io/component: bridge-web
    spec:
      serviceAccountName: bridge-web
      containers:
        - name: bridge
          # Customer-published. Overwrite via Kustomize image transformer.
          image: ghcr.io/CHANGE_ME/sunfish-bridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SUNFISH_BRIDGE_TENANT_SLUG
              value: acmedemo
            - name: SUNFISH_BRIDGE_DEPLOYMENT_MODE
              value: OptionB-Dedicated
            - name: ConnectionStrings__bridge-db
              valueFrom:
                secretKeyRef:
                  name: bridge-postgres
                  key: connection-string
            - name: ConnectionStrings__cache
              valueFrom:
                secretKeyRef:
                  name: bridge-redis
                  key: connection-string
            - name: ConnectionStrings__messaging
              valueFrom:
                secretKeyRef:
                  name: bridge-rabbit
                  key: connection-string
          volumeMounts:
            - name: install-seed
              mountPath: /etc/sunfish/seed
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: install-seed
          secret:
            secretName: bridge-install-seed
            defaultMode: 0400

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-web
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: bridge-web
  annotations:
    # Ingress-NGINX annotations. Adapt for Contour / Traefik / cert-manager.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - acme.bridge.example.com
      secretName: bridge-web-tls
  rules:
    - host: acme.bridge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bridge-web
                port:
                  number: 80
