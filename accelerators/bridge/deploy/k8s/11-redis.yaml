# ============================================================================
# Redis — StatefulSet + headless Service
# ============================================================================
# Auth-token enabled via envFrom of bridge-redis secret.

apiVersion: v1
kind: Service
metadata:
  name: bridge-redis
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: redis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-redis-config
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: redis
data:
  redis.conf: |
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    appendonly yes
    tcp-keepalive 60

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bridge-redis
  namespace: sunfish-bridge-acmedemo
  labels:
    app.kubernetes.io/part-of: sunfish-bridge
    app.kubernetes.io/component: redis
spec:
  serviceName: bridge-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: sunfish-bridge
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
            - --requirepass
            - $(REDIS_PASSWORD)
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bridge-redis
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: bridge-redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
